# Conda environment for orchestrator RL fine-tuning.
# Pins versions to match AgentFlow's scripts/setup_stable_gpu.sh exactly.
#
# Create with:
#   conda env create -f jobs/environment_train.yml
#   conda activate cosmas-train
#
# Then install local packages as needed:
#   pip install -e $HOME/azywot/AgentFlow/agentflow
#   pip install -e .   # msc-thesis (fine_tuning module)

name: cosmas-train
channels:
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    # Core ML stack — pinned to AgentFlow's setup_stable_gpu.sh
    - torch==2.7.0
    - torchvision==0.22.0
    - torchaudio==2.7.0
    - transformers==4.53.3
    # flash-attn: install after env exists — `pip install flash-attn==2.8.1 --no-build-isolation`
    # (see jobs/008_prepare_fine_tuning_data.job). Conda's batched pip install often breaks
    # flash-attn's build (torch not visible in PEP517 build isolation).
    - vllm==0.9.2
    - verl==0.5.0
    # Supporting deps
    - datasets>=3.0.0
    - pyarrow>=15.0.0
    - wandb>=0.16.0
    - filelock>=3.13.0
    - sympy>=1.13.0
    - omegaconf>=2.3.0
    - codetiming>=1.4.0
    - numpy
    - pandas
    - pyyaml>=6.0
    - python-dotenv>=1.0.0
    - requests>=2.31.0
