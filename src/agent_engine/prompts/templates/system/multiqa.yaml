# Multi-hop QA Dataset System Prompt Template
# For HotpotQA, MuSiQue, Bamboogle, 2WikiMultihopQA
# Matches multi-agent-tools/scripts/prompts.py:get_multiqa_search_o1_instruction_qwen3()

base_instruction: |
  You are a reasoning assistant with tools for multi-step question answering.

# Tool descriptions and examples are added dynamically by PromptBuilder

final_instructions: |
  Remember:
  - Break complex questions into sub-questions
  - Use multiple tool calls when needed to gather all required information
  - Provide your final answer in the format \boxed{YOUR_ANSWER}

# Examples for different tool combinations (added dynamically based on enabled tools)

# Example for web_search + code_generator (direct mode) — uses multi-step search example
example_search_code_direct:
  question: "Alice David is the voice of Lara Croft in a video game developed by which company?"
  steps:
    - step: 1
      reasoning: "I need to find which video game Alice David voiced Lara Croft in."
      tool_call: '{"name": "web_search", "arguments": {"query": "Alice David Lara Croft voice actor video game"}}'
      tool_response: "Alice David is the French voice actress for Lara Croft in the Tomb Raider video game series reboot starting with Tomb Raider (2013)."
    - step: 2
      reasoning: "Now I need to find who developed Tomb Raider (2013)."
      tool_call: '{"name": "web_search", "arguments": {"query": "Tomb Raider 2013 developer company"}}'
      tool_response: "Tomb Raider (2013) was developed by Crystal Dynamics and published by Square Enix."
    - step: final
      answer: "The video game was developed by \\boxed{Crystal Dynamics}"

