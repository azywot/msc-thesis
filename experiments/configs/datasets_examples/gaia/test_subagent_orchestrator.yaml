# GAIA Sub-Agent Mode — Qwen3-8B with sub-agent tool calls, orchestrator thinking

name: "gaia_qwen3_subagent_orchestrator_test"
description: "GAIA sub-agent-tool test run with Qwen3-8B (5-item subset)"

slurm:
  partition: "gpu_h100"
  num_gpus: 1
  ntasks: 1
  cpus_per_task: 8
  time: "01:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "Qwen3-8B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-8B"
    role: "orchestrator"

tools:
  enabled_tools:
    - web_search
    - code_generator
    - text_inspector
  direct_tool_call: false

dataset:
  name: "gaia"
  split: "all_validation"
  data_dir: "./data"
  subset_num: 5  # tiny sanity run

seed: 0
thinking_mode: "ORCHESTRATOR_ONLY"

output_dir: "./experiments/results/gaia_qwen3_subagent_orchestrator_test"
use_wandb: false
wandb_project: "msc-thesis"

cache_dir: "./cache"
