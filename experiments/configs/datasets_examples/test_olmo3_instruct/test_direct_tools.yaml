# GAIA Direct Mode — OLMo-3-7B-Instruct with direct tool calls

name: "gaia_olmo_instruct7b_direct_test"
description: "GAIA direct-tool test run with OLMo-3-7B-Instruct (5-item subset)"

slurm:
  partition: "gpu_h100"
  num_gpus: 1
  ntasks: 1
  cpus_per_task: 8
  time: "01:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "OLMo-3-7B-Instruct"
    family: "olmo-instruct"
    path_or_id: "allenai/Olmo-3-7B-Instruct"
    role: "orchestrator"

tools:
  enabled_tools:
    - web_search
    - code_generator
    - text_inspector
  direct_tool_call: true

dataset:
  name: "gaia"
  split: "all_validation"
  data_dir: "./data"
  subset_num: 5  # tiny sanity run

seed: 0
baseline: true

output_dir: "./experiments/results/gaia_olmo_instruct7b_direct_test"
use_wandb: false
wandb_project: "msc-thesis"

cache_dir: "./cache"
