################################################################################
# agent_engine experiment config template
#
# Copy this file and customise the values. All fields are YAML.
#
# Minimal config only needs:
# - name
# - models.orchestrator
# - tools
# - (optional) dataset
################################################################################

# ------------------------------------------------------------------------------
# Metadata
# ------------------------------------------------------------------------------
name: "test_gaia_snippet"
description: "Initial test of GAIA snippet"

# ------------------------------------------------------------------------------
# SLURM job settings (used by jobs/scripts/generate_job.py)
# ------------------------------------------------------------------------------
slurm:
  partition: "gpu_h100"
  num_gpus: 1
  ntasks: 1
  cpus_per_task: 8
  time: "04:00:00"
  conda_env: "agent_engine"

# ------------------------------------------------------------------------------
# Models
#
# Each key under `models` is a role name.  The `orchestrator` role is required.
# Sub-agent roles (web_search, code_generator, …) are only used when
# tools.direct_tool_call is false.
#
# supports_thinking is auto-derived from `family` (true for qwen3/qwq/deepseek).
# Set it explicitly only to override that default.
#
# seed is optional per model; omit to inherit the top-level seed value.
#
# gpu_memory_utilization is auto-resolved at runtime (mirrors multi-agent-tools):
#   - 1 local model         → 0.95
#   - N models, N≤num_gpus  → 0.9 each, pinned to separate GPUs
#   - N models, N>num_gpus  → 0.9/N shared
#   - Large (14B+) main, ≥4 GPUs → main gets 2 GPUs for TP, rest get 1
# Set it explicitly per model only to override.
# ------------------------------------------------------------------------------
models:
  orchestrator:
    name: "Qwen3-4B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-4B"
    role: "orchestrator"
    max_model_len: 32768
    max_tokens: 8192
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repetition_penalty: 1.05

  web_search:
    name: "Qwen3-4B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-4B"
    role: "web_search"
    max_model_len: 32768
    max_tokens: 4096
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repetition_penalty: 1.05

  code_generator:
    name: "Qwen3-4B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-4B"
    role: "code_generator"
    max_model_len: 32768
    max_tokens: 4096
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repetition_penalty: 1.05

  text_inspector:
    name: "Qwen3-4B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-4B"
    role: "text_inspector"
    max_model_len: 32768
    max_tokens: 4096
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repetition_penalty: 1.05

  context_manager:
    name: "Qwen3-4B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-4B"
    role: "context_manager"
    max_model_len: 32768
    max_tokens: 4096
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repetition_penalty: 1.05

  image_inspector:
    name: "Qwen2.5-VL-3B"
    family: "qwen3"                          # Uses Qwen chat-template logic
    path_or_id: "Qwen/Qwen2.5-VL-3B-Instruct"
    role: "image_inspector"
    max_model_len: 32768
    max_tokens: 4096
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repetition_penalty: 1.05

# ------------------------------------------------------------------------------
# Tools
#
# direct_tool_call:
#   true  → tools run inline (no sub-agent LLM inside each tool)
#   false → tools use their model role to analyse/summarise results
#
# web_search requires SERPER_API_KEY in the environment.
# ------------------------------------------------------------------------------
tools:
  enabled_tools:
    - web_search
    - code_generator
    - text_inspector
    - context_manager
    - image_inspector
  direct_tool_call: false
  max_search_limit: 10
  top_k_results: 5
  max_doc_len: 3000

# ------------------------------------------------------------------------------
# Dataset (optional — omit for ad-hoc single-question runs)
# ------------------------------------------------------------------------------
dataset:
  name: "gaia"
  split: "all_validation"
  data_dir: "./data"
  subset_num: 5  # -1 for all examples

# ------------------------------------------------------------------------------
# Execution
# ------------------------------------------------------------------------------
max_turns: 15
seed: 0

# thinking_mode: NO | ORCHESTRATOR_ONLY | SUBAGENTS_ONLY | ALL
thinking_mode: "ORCHESTRATOR_ONLY"

# ------------------------------------------------------------------------------
# Output
# ------------------------------------------------------------------------------
output_dir: "./experiments/results/test_gaia_snippet"
use_wandb: true
wandb_project: "msc-thesis"

# ------------------------------------------------------------------------------
# Caching
# ------------------------------------------------------------------------------
cache_dir: "./cache"
