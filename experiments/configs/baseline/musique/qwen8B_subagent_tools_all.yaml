# MuSiQue — Qwen3-8B, sub-agent tools, orchestrator + sub-agents thinking

name: "baseline_musique_qwen8B_subagent_tools_all"
description: "[Baseline; NO image_inspector, NO mindmap] MuSiQue validation_subset_200 with Qwen3-8B, sub-agent tools, orchestrator + sub-agents thinking"

slurm:
  partition: "gpu_h100"
  num_gpus: 2
  ntasks: 1
  cpus_per_task: 8
  time: "16:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "Qwen3-8B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-8B"
    role: "orchestrator"

tools:
  enabled_tools:
    - web_search
    - code_generator
  direct_tool_call: false

dataset:
  name: "musique"
  split: "validation_subset_200"
  data_dir: "./data"
  subset_num: -1

seed: 0
thinking_mode: "ALL"
baseline: true

output_dir: "./experiments/results/baseline/musique/qwen8B_subagent_tools_all"
use_wandb: true
wandb_project: "benchmarks"

cache_dir: "./cache"
