# GAIA — Qwen3-8B, no tools, orchestrator thinking

name: "baseline_gaia_qwen8B_no_tools_orchestrator"
description: "[Baseline; NO image_inspector, NO mindmap] GAIA all_validation with Qwen3-8B, no tools, orchestrator thinking"

slurm:
  partition: "gpu_h100"
  num_gpus: 2
  ntasks: 1
  cpus_per_task: 8
  time: "16:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "Qwen3-8B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-8B"
    role: "orchestrator"

tools:
  enabled_tools: []
  direct_tool_call: true

dataset:
  name: "gaia"
  split: "all_validation"
  data_dir: "./data"
  subset_num: -1

seed: 0
thinking_mode: "ORCHESTRATOR_ONLY"
baseline: true

output_dir: "./experiments/results/baseline/gaia/qwen8B_no_tools_orchestrator"
use_wandb: true
wandb_project: "benchmarks"

cache_dir: "./cache"
