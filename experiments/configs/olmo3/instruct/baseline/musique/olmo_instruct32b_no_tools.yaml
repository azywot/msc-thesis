# MuSiQue — OLMo-3.1-32B-Instruct, no tools

name: "OLMo_Instruct_baseline_musique_olmo_instruct32b_no_tools"
description: "[OLMo-Instruct Baseline; NO image_inspector, NO mindmap] MuSiQue validation_subset_200 with OLMo-3.1-32B-Instruct, no tools"

slurm:
  partition: "gpu_h100"
  num_gpus: 2
  ntasks: 1
  cpus_per_task: 8
  time: "24:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "OLMo-3.1-32B-Instruct"
    family: "olmo-instruct"
    path_or_id: "allenai/Olmo-3.1-32B-Instruct"
    role: "orchestrator"
    tensor_parallel_size: 2  # TP must divide num attention heads.

tools:
  enabled_tools: []
  direct_tool_call: true

dataset:
  name: "musique"
  split: "validation_subset_200"
  data_dir: "./data"
  subset_num: -1

seed: 0
baseline: true
output_dir: "./experiments/results/olmo/instruct/baseline/musique/olmo_instruct32b_no_tools"
use_wandb: true
wandb_project: "benchmarks"

cache_dir: "./cache"
