# MuSiQue — OLMo-3-7B-Instruct, sub-agent tools

name: "OLMo_Instruct_AF_musique_olmo_instruct7b_subagent_tools"
description: "[OLMo-Instruct AgentFlow; NO image_inspector, NO mindmap] MuSiQue validation_subset_200 with OLMo-3-7B-Instruct, sub-agent tools"

slurm:
  partition: "gpu_h100"
  num_gpus: 2
  ntasks: 1
  cpus_per_task: 8
  time: "24:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "OLMo-3-7B-Instruct"
    family: "olmo-instruct"
    path_or_id: "allenai/Olmo-3-7B-Instruct"
    role: "orchestrator"

tools:
  enabled_tools:
    - web_search
    - code_generator
  direct_tool_call: false

dataset:
  name: "musique"
  split: "validation_subset_200"
  data_dir: "./data"
  subset_num: -1

seed: 0
output_dir: "./experiments/results/olmo/instruct/agentflow/musique/olmo_instruct7b_subagent_tools"
use_wandb: true
wandb_project: "benchmarks"

cache_dir: "./cache"
