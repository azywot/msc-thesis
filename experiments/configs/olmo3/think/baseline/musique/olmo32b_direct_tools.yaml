# MuSiQue — OLMo-3.1-32B-Think, direct tools

name: "OLMo_Think_baseline_musique_olmo32b_direct_tools"
description: "[OLMo-Think Baseline; NO image_inspector, NO mindmap] MuSiQue validation_subset_200 with OLMo-3.1-32B-Think, direct tools"

slurm:
  partition: "gpu_h100"
  num_gpus: 2
  ntasks: 1
  cpus_per_task: 8
  time: "24:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "OLMo-3.1-32B-Think"
    family: "olmo-think"
    path_or_id: "allenai/Olmo-3.1-32B-Think"
    role: "orchestrator"
    tensor_parallel_size: 2  # TP must divide num attention heads.

tools:
  enabled_tools:
    - web_search
    - code_generator
  direct_tool_call: true

dataset:
  name: "musique"
  split: "validation_subset_200"
  data_dir: "./data"
  subset_num: -1

seed: 0
baseline: true
output_dir: "./experiments/results/olmo/think/baseline/musique/olmo32b_direct_tools"
use_wandb: true
wandb_project: "benchmarks"

cache_dir: "./cache"
