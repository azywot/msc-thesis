# GAIA — Qwen3-8B, sub-agent tools, all thinking

name: "gaia_qwen8B_subagent_tools_all"
description: "GAIA all_validation with Qwen3-8B, sub-agent tools, orchestrator + sub-agents thinking"

slurm:
  partition: "gpu_h100"
  num_gpus: 2
  ntasks: 1
  cpus_per_task: 8
  time: "16:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "Qwen3-8B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-8B"
    role: "orchestrator"

  image_inspector:
    name: "Qwen3-VL-8B-Instruct"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-VL-8B-Instruct"
    role: "image_inspector"

tools:
  enabled_tools:
    - web_search
    - code_generator
    - text_inspector
    - image_inspector
    - context_manager
  direct_tool_call: false

dataset:
  name: "gaia"
  split: "all_validation"
  data_dir: "./data"
  subset_num: -1

seed: 0
thinking_mode: "ALL"

output_dir: "./experiments/results/1_milestone/gaia/qwen8B_subagent_tools_all"
use_wandb: true
wandb_project: "benchmarks"

cache_dir: "./cache"
