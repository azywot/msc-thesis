# MuSiQue Sub-Agent Mode — Qwen3-4B for all text roles

name: "musique_qwen3_subagent"
description: "MuSiQue with sub-agent mode using Qwen3-4B for orchestrator and tool agents"

slurm:
  partition: "gpu_h100"
  num_gpus: 1
  ntasks: 1
  cpus_per_task: 8
  time: "08:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "Qwen3-4B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-4B"
    role: "orchestrator"

  # web_search, code_generator, text_inspector, context_manager are omitted —
  # they share Qwen3-4B with the orchestrator and will reuse its cached instance.

tools:
  enabled_tools:
    - web_search
    - code_generator
    - context_manager
  direct_tool_call: false

dataset:
  name: "musique"
  split: "validation"
  data_dir: "./data"
  subset_num: -1  # -1 for all

seed: 0
thinking_mode: "ORCHESTRATOR_ONLY"

output_dir: "./experiments/results/musique_qwen3_subagent"
use_wandb: true
wandb_project: "msc-thesis-benchmarks"

cache_dir: "./cache"

