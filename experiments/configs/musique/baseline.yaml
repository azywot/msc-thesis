# MuSiQue Baseline — Qwen3-4B, direct tool call, orchestrator thinking

name: "musique_qwen3_baseline"
description: "MuSiQue validation set evaluation with Qwen3-4B and full toolset"

slurm:
  partition: "gpu_h100"
  num_gpus: 1
  ntasks: 1
  cpus_per_task: 8
  time: "10:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "Qwen3-4B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-4B"
    role: "orchestrator"

tools:
  enabled_tools:
    - web_search
    - code_generator
    - context_manager
  direct_tool_call: true

dataset:
  name: "musique"
  split: "validation"
  data_dir: "./data"
  subset_num: -1  # -1 for all

seed: 0
thinking_mode: "ORCHESTRATOR_ONLY"

output_dir: "./experiments/results/musique_baseline"
use_wandb: true
wandb_project: "msc-thesis"

cache_dir: "./cache"

