# MuSiQue — Qwen3-32B, direct tool call, no thinking

name: "AF_no_img_no_mm_musique_qwen32B_direct_tools_none"
description: "[AgentFlow; NO image_inspector, NO mindmap] MuSiQue validation with Qwen3-32B, direct tools, thinking disabled"

slurm:
  partition: "gpu_h100"
  num_gpus: 2
  ntasks: 1
  cpus_per_task: 8
  time: "16:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "Qwen3-32B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-32B"
    role: "orchestrator"
    tensor_parallel_size: 2  # 64 heads; TP must divide 64.

tools:
  enabled_tools:
    - web_search
    - code_generator
  direct_tool_call: true

dataset:
  name: "musique"
  split: "validation"
  data_dir: "./data"
  subset_num: -1

seed: 0
thinking_mode: "NO"

output_dir: "./experiments/results/1_milestone_no_img_no_mindmap_AgentFlow/musique/qwen32B_direct_tools_none"
use_wandb: true
wandb_project: "benchmarks"

cache_dir: "./cache"
