# MuSiQue — Qwen3-8B, no tools, thinking disabled

name: "AF_no_img_no_mm_musique_qwen8B_no_tools_none"
description: "[AgentFlow; NO image_inspector, NO mindmap] MuSiQue validation_subset_200 with Qwen3-8B, no tools, thinking disabled"

slurm:
  partition: "gpu_h100"
  num_gpus: 2
  ntasks: 1
  cpus_per_task: 8
  time: "16:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "Qwen3-8B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-8B"
    role: "orchestrator"

tools:
  enabled_tools: []
  direct_tool_call: true

dataset:
  name: "musique"
  split: "validation_subset_200"
  data_dir: "./data"
  subset_num: -1

seed: 0
thinking_mode: "NO"
output_dir: "./experiments/results/1_milestone_no_img_no_mindmap_AgentFlow/musique/qwen8B_no_tools_none"
use_wandb: true
wandb_project: "benchmarks"

cache_dir: "./cache"
