# GAIA — OLMo-3-7B-Think, sub-agent tools, orchestrator + sub-agents thinking

name: "OLMo_Think_gaia_olmo7b_subagent_tools"
description: "[OLMo-Think; NO image_inspector, NO mindmap] GAIA all_validation with OLMo-3-7B-Think, sub-agent tools, orchestrator + sub-agents thinking"

slurm:
  partition: "gpu_h100"
  num_gpus: 1
  ntasks: 1
  cpus_per_task: 8
  time: "16:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "OLMo-3-7B-Think"
    family: "olmo-think"
    path_or_id: "allenai/Olmo-3-7B-Think"
    role: "orchestrator"

tools:
  enabled_tools:
    - web_search
    - code_generator
    - text_inspector
  direct_tool_call: false

dataset:
  name: "gaia"
  split: "all_validation"
  data_dir: "./data"
  subset_num: -1

seed: 0
thinking_mode: "ALL"
output_dir: "./experiments/results/olmo/think/gaia/olmo7b_subagent_tools"
use_wandb: true
wandb_project: "benchmarks"

cache_dir: "./cache"
