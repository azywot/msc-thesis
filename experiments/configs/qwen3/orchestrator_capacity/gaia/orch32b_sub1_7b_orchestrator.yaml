# GAIA — orch Qwen3-32B / sub-agent Qwen3-1.7B, sub-agent tools, orchestrator thinking

name: "OC_gaia_orch32b_sub1_7b_orchestrator"
description: "[OrchestratorCapacity; NO image_inspector, NO mindmap] GAIA all_validation with orch Qwen3-32B / sub-agent Qwen3-1.7B, sub-agent tools, orchestrator thinking"

slurm:
  partition: "gpu_h100"
  num_gpus: 3
  ntasks: 1
  cpus_per_task: 8
  time: "24:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "Qwen3-32B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-32B"
    role: "orchestrator"
    tensor_parallel_size: 2  # TP must divide num attention heads.
  web_search:
    name: "Qwen3-1.7B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-1.7B"
    role: "web_search"
  code_generator:
    name: "Qwen3-1.7B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-1.7B"
    role: "code_generator"
  text_inspector:
    name: "Qwen3-1.7B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-1.7B"
    role: "text_inspector"

tools:
  enabled_tools:
    - web_search
    - code_generator
    - text_inspector
  direct_tool_call: false

dataset:
  name: "gaia"
  split: "all_validation"
  data_dir: "./data"
  subset_num: -1

seed: 0
thinking_mode: "ORCHESTRATOR_ONLY"
output_dir: "./experiments/results/orchestrator_capacity/gaia/orch32b_sub1_7b_orchestrator"
use_wandb: true
wandb_project: "benchmarks"

cache_dir: "./cache"
