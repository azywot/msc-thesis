# MuSiQue — orch Qwen3-8B / sub-agent Qwen3-1.7B, sub-agent tools, orchestrator thinking

name: "OC_musique_orch8b_sub1_7b_orchestrator"
description: "[OrchestratorCapacity; NO image_inspector, NO mindmap] MuSiQue validation_subset_200 with orch Qwen3-8B / sub-agent Qwen3-1.7B, sub-agent tools, orchestrator thinking"

slurm:
  partition: "gpu_h100"
  num_gpus: 2
  ntasks: 1
  cpus_per_task: 8
  time: "24:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "Qwen3-8B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-8B"
    role: "orchestrator"
  web_search:
    name: "Qwen3-1.7B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-1.7B"
    role: "web_search"
  code_generator:
    name: "Qwen3-1.7B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-1.7B"
    role: "code_generator"

tools:
  enabled_tools:
    - web_search
    - code_generator
  direct_tool_call: false

dataset:
  name: "musique"
  split: "validation_subset_200"
  data_dir: "./data"
  subset_num: -1

seed: 0
thinking_mode: "ORCHESTRATOR_ONLY"
output_dir: "./experiments/results/orchestrator_capacity/musique/orch8b_sub1_7b_orchestrator"
use_wandb: true
wandb_project: "benchmarks"

cache_dir: "./cache"
