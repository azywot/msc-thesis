# GAIA — Qwen3-8B, sub-agent tools, orchestrator thinking

name: "AF_struct_mem_ablation_gaia_qwen8B_subagent_orch_baseline_chat"
description: "[Structured-memory ablation: subagent tools + orch thinking, baseline chat (no query analysis / structured memory); NO image_inspector, NO mindmap] GAIA all_validation with Qwen3-8B, sub-agent tools, orchestrator thinking"

slurm:
  partition: "gpu_h100"
  num_gpus: 1
  ntasks: 1
  cpus_per_task: 8
  time: "24:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "Qwen3-8B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-8B"
    role: "orchestrator"

tools:
  enabled_tools:
    - web_search
    - code_generator
    - text_inspector
  direct_tool_call: false

dataset:
  name: "gaia"
  split: "all_validation"
  data_dir: "./data"
  subset_num: -1

seed: 0
thinking_mode: "ORCHESTRATOR_ONLY"
baseline: true
output_dir: "./experiments/results/structured_memory_ablation/gaia/qwen8B_subagent_orch_baseline_chat"
use_wandb: true
wandb_project: "benchmarks"

cache_dir: "./cache"
