# GAIA Direct Mode — single orchestrator model, tools execute without sub-agent LLMs

name: "gaia_qwen3_direct_test"
description: "GAIA with direct tool execution using Qwen3-4B (no sub-agents)"

slurm:
  partition: "gpu_h100"
  num_gpus: 1
  ntasks: 1
  cpus_per_task: 8
  time: "01:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "Qwen3-4B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-4B"
    role: "orchestrator"

tools:
  enabled_tools:
    - web_search
    - code_generator
    - text_inspector
    - context_manager
  direct_tool_call: true

dataset:
  name: "gaia"
  split: "all_validation"
  data_dir: "./data"
  subset_num: 10  # -1 for all

seed: 0
thinking_mode: "ORCHESTRATOR_ONLY"

output_dir: "./experiments/results/gaia_qwen3_direct_test"
use_wandb: true
wandb_project: "msc-thesis-benchmarks"

cache_dir: "./cache"
