# GAIA Direct Mode Configuration
# Tools execute directly without sub-agent LLMs

name: "gaia_qwen3_direct"
description: "GAIA with direct tool execution using Qwen3-4B (no sub-agents)"

# Single model - only orchestrator needed
models:
  orchestrator:
    name: "Qwen3-4B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-4B"
    role: "orchestrator"

    # Generation parameters
    max_model_len: 32768
    max_tokens: 8192
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repetition_penalty: 1.05

    # Capabilities
    supports_thinking: true

    seed: 0

# Tool configuration
tools:
  enabled_tools:
    - web_search
    - code_generator
    - text_inspector
    - context_manager
  direct_tool_call: true  # Direct mode (no sub-agent LLMs)
  max_search_limit: 10
  top_k_results: 5
  max_doc_len: 3000

# Dataset
dataset:
  name: "gaia"
  split: "all_validation"
  data_dir: "./data"
  subset_num: 5  # -1 for all examples

# Execution settings
max_turns: 15
seed: 0

# Thinking mode: ORCHESTRATOR_ONLY since no sub-agents
# Options: NO, ORCHESTRATOR_ONLY, SUBAGENTS_ONLY, ALL
thinking_mode: "ORCHESTRATOR_ONLY"

# Output
output_dir: "./experiments/results/gaia_direct_mode"
use_wandb: false
wandb_project: "msc-thesis"

# Caching
cache_dir: "./cache"
