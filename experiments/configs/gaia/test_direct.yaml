# GAIA Direct Mode — single orchestrator model, tools execute without sub-agent LLMs

name: "gaia_qwen3_direct"
description: "GAIA with direct tool execution using Qwen3-4B (no sub-agents)"

slurm:
  partition: "gpu_h100"
  num_gpus: 1
  ntasks: 1
  cpus_per_task: 8
  time: "04:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "Qwen3-4B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-4B"
    role: "orchestrator"

tools:
  enabled_tools:
    - web_search
    - code_generator
    - text_inspector
    - context_manager
  direct_tool_call: true
  max_search_limit: 10
  top_k_results: 5
  max_doc_len: 3000

dataset:
  name: "gaia"
  split: "all_validation"
  data_dir: "./data"
  subset_num: 5  # -1 for all

max_turns: 15
seed: 0
thinking_mode: "ORCHESTRATOR_ONLY"

output_dir: "./experiments/results/gaia_direct_mode"
use_wandb: false
wandb_project: "msc-thesis"

cache_dir: "./cache"
