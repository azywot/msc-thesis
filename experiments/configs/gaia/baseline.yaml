# GAIA Baseline Experiment Configuration
# This config defines a complete experiment using Qwen3-4B

name: "gaia_qwen3_baseline"
description: "GAIA validation set evaluation with Qwen3-4B and full toolset"

# Model configuration
models:
  planner:
    name: "Qwen3-4B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-4B"
    role: "planner"

    # Generation parameters
    max_model_len: 32768
    max_tokens: 8192
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repetition_penalty: 1.05

    # Capabilities
    supports_thinking: true

    # Reproducibility
    seed: 0

# Tool configuration
tools:
  enabled_tools:
    - web_search
    - code_generator
    - text_inspector
    - mind_map
  direct_tool_call: true  # Direct mode - no sub-agent LLMs (more efficient)
  max_search_limit: 10
  top_k_results: 10
  max_doc_len: 3000

# Dataset configuration
dataset:
  name: "gaia"
  split: "all_validation"
  data_dir: "./data"
  subset_num: 5  # -1 for all examples

# Execution settings
max_turns: 15
seed: 0
thinking_mode: "PLANNER_ONLY"  # Options: NO, PLANNER_ONLY, SUBAGENTS_ONLY, ALL

# Output settings
output_dir: "./experiments/results/gaia_baseline"
use_wandb: false
wandb_project: "msc-thesis"

# Caching
cache_dir: "./cache"
