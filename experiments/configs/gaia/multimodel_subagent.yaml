# GAIA Multi-Model Sub-Agent Configuration
# This demonstrates using different models for orchestrator and tools

name: "gaia_multimodel_subagent"
description: "GAIA with Qwen3-32B orchestrator and Qwen3-14B sub-agents"

# Multiple models for different roles
models:
  # Main orchestrator (planner)
  planner:
    name: "Qwen3-32B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-32B"
    role: "planner"
    max_tokens: 8192
    temperature: 0.7
    top_p: 0.8
    supports_thinking: true
    tensor_parallel_size: 2
    gpu_ids: [0, 1]
    seed: 0

  # Web search sub-agent (smaller model for efficiency)
  search:
    name: "Qwen3-14B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-14B"
    role: "search"
    max_tokens: 4096
    temperature: 0.7
    supports_thinking: true  # Can use thinking too
    tensor_parallel_size: 1
    gpu_ids: [2]
    seed: 0

  # Code generation sub-agent
  coding:
    name: "Qwen3-14B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-14B"
    role: "coding"
    max_tokens: 4096
    temperature: 0.7
    supports_thinking: false  # No thinking for coding
    tensor_parallel_size: 1
    gpu_ids: [3]
    seed: 0

# Tool configuration
tools:
  enabled_tools:
    - web_search
    - code_generator
    - text_inspector
    - image_inspector
  direct_tool_call: false  # Use sub-agent mode (LLMs analyze/generate)
  max_search_limit: 10
  top_k_results: 10
  max_doc_len: 3000

# Dataset
dataset:
  name: "gaia"
  split: "all_validation"
  data_dir: "/scratch-shared/azywot/data"
  subset_num: -1  # All examples

# Execution settings
max_turns: 15
seed: 0

# Thinking mode: ALL means both planner and sub-agents use thinking
# Options: NO, PLANNER_ONLY, SUBAGENTS_ONLY, ALL
thinking_mode: "ALL"

# Output
output_dir: "./experiments/results/gaia_multimodel_subagent"
use_wandb: true
wandb_project: "msc-thesis"

# Caching
cache_dir: "./cache"
