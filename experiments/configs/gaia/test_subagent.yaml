# GAIA Sub-Agent Mode — Qwen3-4B for all text roles, Qwen2.5-VL-3B for images

name: "gaia_qwen3_subagent_test"
description: "GAIA with sub-agent mode using Qwen3-4B for orchestrator and tool agents (text + vision)"

slurm:
  partition: "gpu_h100"
  num_gpus: 1
  ntasks: 1
  cpus_per_task: 8
  time: "01:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "Qwen3-4B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-4B"
    role: "orchestrator"

  # web_search, code_generator, text_inspector, context_manager are omitted —
  # they share Qwen3-4B with the orchestrator and will reuse its cached instance.

  image_inspector:
    name: "Qwen2.5-VL-3B"
    family: "qwen3"                          # Uses Qwen chat-template logic
    path_or_id: "Qwen/Qwen2.5-VL-3B-Instruct"
    role: "image_inspector"

tools:
  enabled_tools:
    - web_search
    - code_generator
    - text_inspector
    - image_inspector
    - context_manager
  direct_tool_call: false

dataset:
  name: "gaia"
  split: "all_validation"
  data_dir: "./data"
  subset_num: 5  # -1 for all

max_turns: 15
seed: 0
thinking_mode: "ORCHESTRATOR_ONLY"

output_dir: "./experiments/results/gaia_qwen3_subagent"
use_wandb: false
wandb_project: "msc-thesis"

cache_dir: "./cache"
