# GAIA Sub-Agent Mode — Qwen3-8B for all text roles, Qwen2.5-VL-3B for images

name: "gaia_qwen3_subagent_test"
description: "GAIA with sub-agent mode using Qwen3-8B for orchestrator and tool agents (text + vision)"

slurm:
  partition: "gpu_h100"
  num_gpus: 1
  ntasks: 1
  cpus_per_task: 8
  time: "01:00:00"
  conda_env: "agent_engine"

models:
  orchestrator:
    name: "Qwen3-8B"
    family: "qwen3"
    path_or_id: "Qwen/Qwen3-8B"
    role: "orchestrator"

  # web_search, code_generator, text_inspector, mind_map are omitted —
  # they share Qwen3-8B with the orchestrator and will reuse its cached instance.

  # image_inspector:
  #   name: "Qwen/Qwen3-VL-4B-Instruct"
  #   family: "qwen3"                          # Uses Qwen chat-template logic
  #   path_or_id: "Qwen/Qwen3-VL-4B-Instruct"
  #   role: "image_inspector"

tools:
  enabled_tools:
    - web_search
    - code_generator
    - text_inspector
  direct_tool_call: false

dataset:
  name: "gaia"
  split: "all_validation"
  data_dir: "./data"
  subset_num: 10  # -1 for all

seed: 0
thinking_mode: "ORCHESTRATOR_ONLY"

output_dir: "./experiments/results/gaia_qwen3_subagent_test"
use_wandb: true
wandb_project: "msc-thesis"

cache_dir: "./cache"
